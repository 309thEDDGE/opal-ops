apiVersion: v1
kind: Namespace
metadata:
  name: jupyterhub
  labels:
    name: jupyterhub
    project: opal
---
apiVersion: v1
kind: Service
metadata:
  namespace: jupyterhub
  name: proxy-api
  labels:
    component: proxy
spec:
  selector:
    component: proxy
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  namespace: jupyterhub
  name: proxy-public
  labels:
    component: proxy
spec:
  selector:
    component: proxy
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8000
    - name: https
      port: 443
      targetPort: 443
    - name: api
      port: 8001
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: jupyterhub
  name: proxy
  labels:
    component: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      component: proxy
  template:
    metadata:
      labels:
        component: proxy
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: chp
          image: registry1.dso.mil/ironbank/opensource/metrostar/jupyterhub:jupyterhub_v8
          command: ["bash"]
          args: ["-c", "source /opt/conda/bin/activate && conda activate jupyterhub && configurable-http-proxy --ip=0.0.0.0 --api-ip=0.0.0.0 --api-port=8001 --default-target=http://$(HUB_SERVICE_HOST):$(HUB_SERVICE_PORT) --error-target=http://$(HUB_SERVICE_HOST):$(HUB_SERVICE_PORT)/hub/error --port=8000 --log-level=debug"]
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: CONFIGPROXY_AUTH_TOKEN
              value: "f7a5ba56603e8f4e4f1a1eb85b551b9e70ff863f76cb5f56e72aa23f84e31b5c"
          ports:
            - containerPort: 8000
              name: proxy-public
            - containerPort: 8001
              name: api
---
apiVersion: v1
kind: Service
metadata:
  namespace: jupyterhub
  name: hub
  labels:
    component: jupyter
spec:
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  selector:
    component: jupyter
---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: jupyterhub
  name: hub
  labels:
    component: jupyter
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  namespace: jupyterhub
  name: hub
  labels:
    component: jupyter
rules:
  - apiGroups: [""]       # "" indicates the core API group
    resources: ["pods", "persistentvolumeclaims"]
    verbs: ["get", "watch", "list", "create", "delete"]
  - apiGroups: [""]       # "" indicates the core API group
    resources: ["events"]
    verbs: ["get", "watch", "list"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  namespace: jupyterhub
  name: hub
  labels:
    component: jupyter
subjects:
  - kind: ServiceAccount
    name: hub
roleRef:
  kind: Role
  name: hub
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: jupyterhub
  name: hub
  labels:
    component: jupyter
spec:
  replicas: 1
  selector:
    matchLabels:
      component: jupyter
  template:
    metadata:
      labels:
        component: jupyter
    spec:
      serviceAccountName: hub
      imagePullSecrets:
        - name: regcred
      containers:
        - name: jupyter-hub
          image: registry1.dso.mil/ironbank/opensource/metrostar/jupyterhub:jupyterhub_v8
          command: ["bash"]
          args: ["-c", "source /opt/conda/bin/activate && conda activate jupyterhub && jupyterhub -f /home/jovyan/jupyterhub_config.py"]
          ports:
            - containerPort: 8081
          env:
            - name: CONFIGPROXY_AUTH_TOKEN
              value: "f7a5ba56603e8f4e4f1a1eb85b551b9e70ff863f76cb5f56e72aa23f84e31b5c"
          envFrom:
            - configMapRef:
                name: opal-env
            - secretRef:
                name: token-env
            - configMapRef:
                name: deployment-env
          resources:
            requests: 
              cpu: 100m
          volumeMounts:
            - name: jupyterhub-config-py-mnt
              mountPath: /home/jovyan/jupyterhub_config.py
              subPath: jupyterhub_config.py
        - name: cron
          image: ubuntu
          command: ["bash", "-c"]
          args:
            - >-
              apt-get update &&
              apt-get install cron python3 python3-pip vim -y &&
              useradd -g 100 jovyan &&
              echo "jovyan" > /etc/cron.d/cron.allow &&
              python3 -m pip install metaflow &&
              cd /share/flows &&
              #tar -xvf flowbits.tar &&
              service cron start &&
              echo "starting cronmanager" &&
              touch /share/flows/managerlog.txt &&
              /usr/bin/python3 /cronmanager/cronmanager.py "/etc/cron.d" "/share/cronjobs" "60" "/share/flows/managerlog.txt"
          resources:
            requests:
              cpu: 100m
          volumeMounts:
#            - name: flowbits-mnt
#              mountPath: /share/flows/flowbits.tar
#              subPath: flowbits.tar
#            - name: idle-script-mnt
#              mountPath: /sleeper/idle.py
#              subPath: idle.py
            - name: cronmanager-mnt
              mountPath: /cronmanager/cronmanager.py
              subPath: cronmanager.py
            - name: flow-share-mnt
              mountPath: /share/flows/
              readOnly: false
            - name: cron-dir-mnt
              mountPath: /share/cronjobs
              readOnly: false
            - name: metaflow-mnt
              mountPath: /opt/opal/metaflow-metadata
              readOnly: false
      volumes:
      - name: jupyterhub-config-py-mnt
        configMap:
          name: jupyterhub-config-py
#      - name: flowbits-mnt
#        configMap:
#          name: flowbits
#          defaultMode: 0o777
      - name: cronmanager-mnt
        configMap:
          name: cronmanager
          defaultMode: 0o600
#      - name: idle-script-mnt
#        configMap:
#          name: idle-script
#          defaultMode: 0o600
      - name: flow-share-mnt
        persistentVolumeClaim:
          claimName: flow-share
      - name: cron-dir-mnt
        persistentVolumeClaim:
          claimName: cron-dir
      - name: metaflow-mnt
        persistentVolumeClaim:
          claimName: metaflow-datastore
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metaflow-datastore
  namespace: jupyterhub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flow-share
  namespace: jupyterhub
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage:
        100Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cron-dir
  namespace: jupyterhub
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage:
        100Mi
